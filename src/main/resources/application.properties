spring.application.name=chordio-api
spring.datasource.url=jdbc:mysql://localhost:3306/chordio
spring.datasource.username=root
spring.datasource.password=1999
spring.datasource.hikari.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
# Automatically copies queries to reduce manual input
spring.jpa.hibernate.ddl-auto=update
# Print MYSQL Queries in console
spring.jpa.show-sql=true